# Generates the contribution "snake" SVG referenced in the README.
# Setup:
#   1. In your  deaa-jahjah/deaa-jahjah  repo, create  .github/workflows/snake.yml
#      and paste this file's contents.
#   2. Settings → Actions → General → Workflow permissions → "Read and write".
#   3. Run it once: Actions tab → "Generate Snake" → Run workflow.
# It writes snake.svg to the  output  branch, which the README already points at.
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" # refresh twice a day
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: deaa-jahjah
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=00ff41&color_dots=0d1117,006400,00b32c,00ff41,7fff7f

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: false
